<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Travel Planner</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">

</head>

<body>

<!-- NAVBAR -->

<nav>

<h2>AI Travel Planner</h2>

<button onclick="toggleMode()">Dark / Light</button>

</nav>

<!-- HERO SECTION -->

<div class="hero">

<h1>Smart Travel Planner</h1>

<p>Plan your journey using AI</p>

<div class="panel">

<input id="from" placeholder="From City">

<input id="to" placeholder="To City">

<select id="transport">

<option value="">Select Transport</option>
<option value="Flight">Flight</option>
<option value="Train">Train</option>
<option value="Bus">Bus</option>
<option value="Car">Car</option>

</select>

<button onclick="planTrip()">Find Route</button>

</div>

</div>

<!-- MAP SECTION -->

<div class="map">

<div class="route" id="routeLine"></div>

</div>

<!-- RESULT SECTION -->

<div class="result" id="result"></div>

<!-- DESTINATIONS -->

<div class="destinations">

<div class="card">

<img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470">

<h3>Goa</h3>

<p>Beautiful beaches and nightlife.</p>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1">

<h3>Bali</h3>

<p>Perfect island for relaxation.</p>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1469854523086-cc02fe5d8800">

<h3>Dubai</h3>

<p>Luxury city with amazing skyline.</p>

</div>

</div>

<!-- AI ASSISTANT -->

<div class="ai-panel">

<h3>AI Travel Assistant</h3>

<input id="question" placeholder="Ask travel question">

<button onclick="askAI()">Ask</button>

<p id="answer"></p>

</div>

<script>

function toggleMode(){

document.body.classList.toggle("light")

}

function planTrip(){

let from=document.getElementById("from").value
let to=document.getElementById("to").value
let transport=document.getElementById("transport").value

if(!from || !to || !transport){

alert("Please enter cities and select transport")

return

}

/* SHOW ROUTE ANIMATION */

document.getElementById("routeLine").style.display="block"

/* DISPLAY RESULT */

document.getElementById("result").innerHTML=

"Route from <b>"+from+"</b> to <b>"+to+
"</b><br>Transport: <b>"+transport+"</b>"

}

function askAI(){

let q=document.getElementById("question").value

document.getElementById("answer").innerText=
"AI Suggestion: For '"+q+"' explore popular destinations and travel deals."

}

</script>

</body>

</html>
