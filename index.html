<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart AI Travel Planner</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#0f172a,#1e3a8a,#6366f1);
color:white;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

.hero h1{
font-size:60px;
animation:float 3s infinite;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-15px)}
100%{transform:translateY(0)}
}

.card{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(12px);
padding:25px;
border-radius:15px;
}

</style>

</head>

<body>

<!-- HERO -->

<div class="hero" id="home">

<h1>Smart AI Travel Planner</h1>

<p class="mt-3 text-lg">AI powered route planning and travel discovery</p>

<div class="card mt-8 w-80">

<input id="from" placeholder="From City"
class="w-full p-3 mb-3 rounded text-black">

<input id="to" placeholder="To City"
class="w-full p-3 mb-3 rounded text-black">

<button onclick="planTrip()"
class="bg-blue-600 w-full p-3 rounded">
Plan Journey
</button>

</div>

</div>

<!-- RESULT -->

<div id="result" class="hidden p-10">

<h2 class="text-3xl mb-4" id="routeTitle"></h2>

<p id="routeInfo"></p>

<!-- MAP -->

<div class="mt-6">

<iframe id="map"
width="100%"
height="400"
style="border:0;border-radius:12px"
loading="lazy"></iframe>

</div>


<!-- RECOMMENDATIONS -->

<div class="mt-10">

<h3 class="text-2xl mb-3">AI Travel Recommendations</h3>

<div id="recommendations"
class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>

</div>


<!-- TRAVEL BOOKING -->

<div class="mt-10 grid grid-cols-1 md:grid-cols-3 gap-6">

<a id="flightLink" target="_blank"
class="card text-center hover:scale-105 transition">

✈ Book Flights

</a>

<a id="hotelLink" target="_blank"
class="card text-center hover:scale-105 transition">

🏨 Book Hotels

</a>

<a id="trainLink" target="_blank"
class="card text-center hover:scale-105 transition">

🚆 Train Tickets

</a>

</div>


<!-- AI CHAT -->

<div class="mt-10">

<h3 class="text-2xl mb-3">AI Travel Assistant</h3>

<div class="card">

<input id="question"
placeholder="Ask travel question..."
class="w-full p-3 rounded text-black">

<button onclick="askAI()"
class="bg-purple-600 p-3 mt-3 rounded">

Ask AI

</button>

<p id="aiAnswer" class="mt-4"></p>

</div>

</div>


<!-- PHOTOS -->

<div class="mt-10 grid grid-cols-1 md:grid-cols-3 gap-6">

<img class="rounded-lg"
src="https://images.unsplash.com/photo-1501785888041-af3ef285b470">

<img class="rounded-lg"
src="https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1">

<img class="rounded-lg"
src="https://images.unsplash.com/photo-1469854523086-cc02fe5d8800">

</div>

</div>


<script>

function planTrip(){

let from=document.getElementById("from").value
let to=document.getElementById("to").value

if(!from||!to){

alert("Enter locations")

return

}

document.getElementById("home").style.display="none"
document.getElementById("result").classList.remove("hidden")

document.getElementById("routeTitle").innerText =
"Travel from "+from+" → "+to

let transport=["Flight","Train","Bus","Car"]

let t=transport[Math.floor(Math.random()*transport.length)]

let cost=Math.floor(Math.random()*5000)+500
let time=Math.floor(Math.random()*10)+2

document.getElementById("routeInfo").innerHTML=

"Best Transport: "+t+
"<br>Estimated Cost: ₹"+cost+
"<br>Estimated Time: "+time+" hours"


let mapURL=
"https://www.google.com/maps?q="+from+"%20to%20"+to+"&output=embed"

document.getElementById("map").src=mapURL


document.getElementById("flightLink").href=
"https://www.google.com/travel/flights?q="+from+"%20to%20"+to

document.getElementById("hotelLink").href=
"https://www.booking.com/searchresults.html?ss="+to

document.getElementById("trainLink").href=
"https://www.irctc.co.in"


showRecommendations()

}

function showRecommendations(){

let places=["Goa","Bali","Dubai","Paris","Tokyo","Singapore"]

let container=document.getElementById("recommendations")

container.innerHTML=""

for(let i=0;i<3;i++){

let p=places[Math.floor(Math.random()*places.length)]

container.innerHTML+=

`<div class="card">

<h4 class="text-xl">${p}</h4>

<p>Top travel destination with great attractions.</p>

</div>`

}

}

function askAI(){

let q=document.getElementById("question").value

document.getElementById("aiAnswer").innerText=

"AI Response: For '"+q+"' I recommend checking popular destinations and travel deals."

}

</script>

</body>

</html>
