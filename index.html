<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Travel Planner</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f172a;
color:white;
transition:0.4s;
}

/* LIGHT MODE */

body.light{
background:white;
color:black;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
padding:20px 40px;
}

button{
padding:10px 20px;
border:none;
border-radius:8px;
cursor:pointer;
}

/* HERO */

.hero{
height:70vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:55px;
animation:float 4s infinite;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

/* MAP */

.map{
width:100%;
height:350px;
background:url("https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg");
background-size:cover;
background-position:center;
margin-top:40px;
position:relative;
}

/* ROUTE ANIMATION */

.route{
position:absolute;
width:200px;
height:3px;
background:red;
top:50%;
left:30%;
transform:rotate(20deg);
animation:moveRoute 2s infinite linear;
}

@keyframes moveRoute{
0%{opacity:0}
50%{opacity:1}
100%{opacity:0}
}

/* SEARCH PANEL */

.panel{
margin-top:30px;
background:rgba(255,255,255,0.1);
padding:25px;
border-radius:12px;
width:320px;
backdrop-filter:blur(12px);
}

input{
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:8px;
border:none;
}

/* DESTINATION CARDS */

.destinations{
margin-top:50px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
padding:40px;
}

.card{
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:12px;
transition:0.4s;
}

.card:hover{
transform:translateY(-10px) scale(1.03);
}

.card img{
width:100%;
border-radius:10px;
margin-bottom:10px;
}

/* AI PANEL */

.ai-panel{
margin:40px;
background:rgba(255,255,255,0.1);
padding:25px;
border-radius:12px;
}

</style>

</head>

<body>

<nav>

<h2>AI Travel Planner</h2>

<button onclick="toggleMode()">Toggle Dark / Light</button>

</nav>

<!-- HERO -->

<div class="hero">

<h1>Smart Travel Planner</h1>

<p>Plan your journey using AI</p>

<div class="panel">

<input id="from" placeholder="From City">

<input id="to" placeholder="To City">

<button onclick="planTrip()">Find Route</button>

</div>

</div>

<!-- MAP -->

<div class="map">

<div class="route"></div>

</div>

<!-- DESTINATIONS -->

<div class="destinations">

<div class="card">

<img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470">

<h3>Goa</h3>

<p>Beautiful beaches and nightlife.</p>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1">

<h3>Bali</h3>

<p>Perfect island for relaxation.</p>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1469854523086-cc02fe5d8800">

<h3>Dubai</h3>

<p>Luxury city with amazing skyline.</p>

</div>

</div>

<!-- AI ASSISTANT -->

<div class="ai-panel">

<h3>AI Travel Assistant</h3>

<input id="question" placeholder="Ask travel question">

<button onclick="askAI()">Ask</button>

<p id="answer"></p>

</div>

<script>

function toggleMode(){

document.body.classList.toggle("light")

}

function planTrip(){

let from=document.getElementById("from").value
let to=document.getElementById("to").value

alert("Route planned from "+from+" to "+to)

}

function askAI(){

let q=document.getElementById("question").value

document.getElementById("answer").innerText=
"AI Suggestion: For '"+q+"' you should explore popular destinations and travel deals."

}

</script>

</body>

</html>
