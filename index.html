<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>AI Travel Planner | Akhilesh</title>

<link rel="stylesheet" href="style.css">

<style>

/* HERO SECTION */

.travel-hero{
height:90vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(120deg,#0f172a,#1e3a8a,#6366f1);
color:white;
}

.travel-content{
display:flex;
gap:60px;
align-items:center;
}

/* TEXT */

.travel-text h1{
font-size:45px;
margin-bottom:10px;
}

.travel-text p{
margin-bottom:20px;
}

/* SEARCH PANEL */

.travel-panel{
background:rgba(255,255,255,0.1);
padding:25px;
border-radius:10px;
width:320px;
backdrop-filter:blur(10px);
}

.travel-panel input,
.travel-panel select{
width:100%;
padding:10px;
margin-bottom:10px;
border:none;
border-radius:6px;
}

.travel-panel button{
width:100%;
padding:10px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
cursor:pointer;
}

/* MAP */

.map-section{
margin-top:40px;
text-align:center;
}

.map{
height:300px;
background:url("https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg");
background-size:cover;
position:relative;
}

.route{
position:absolute;
width:200px;
height:3px;
background:red;
top:50%;
left:30%;
display:none;
animation:routeMove 2s infinite linear;
}

@keyframes routeMove{
0%{opacity:0}
50%{opacity:1}
100%{opacity:0}
}

/* RESULT */

.result{
margin-top:20px;
font-size:18px;
}

</style>

</head>

<body>

<!-- NAVBAR (same structure as your portfolio) -->

<nav class="navbar glass">

<div class="logo">Akhilesh</div>

<ul>
<li><a href="index.html">Home</a></li>
<li><a href="projects.html">Projects</a></li>
<li><a href="travel.html" class="active">Travel Planner</a></li>
</ul>

<div class="social">
<a href="https://github.com/Akhilesh9148">GitHub</a>
<a href="https://linkedin.com">LinkedIn</a>
</div>

</nav>


<!-- HERO SECTION -->

<section class="travel-hero">

<div class="travel-content">

<div class="travel-text">

<h1>AI Travel Planner</h1>

<p>Find the best travel route using AI.</p>

<div class="travel-panel">

<input id="from" placeholder="From City">

<input id="to" placeholder="To City">

<select id="transport">

<option value="">Select Transport</option>
<option value="Flight">Flight</option>
<option value="Train">Train</option>
<option value="Bus">Bus</option>
<option value="Car">Car</option>

</select>

<button onclick="planTrip()">Find Route</button>

</div>

</div>

</div>

</section>


<!-- MAP -->

<div class="map-section">

<div class="map">

<div class="route" id="routeLine"></div>

</div>

<div class="result" id="result"></div>

</div>


<script>

function planTrip(){

let from=document.getElementById("from").value
let to=document.getElementById("to").value
let transport=document.getElementById("transport").value

if(!from || !to || !transport){

alert("Please fill all fields")

return

}

document.getElementById("routeLine").style.display="block"

document.getElementById("result").innerHTML=

"Route from <b>"+from+"</b> to <b>"+to+
"</b><br>Transport: <b>"+transport+"</b>"

}

</script>

</body>

</html>
