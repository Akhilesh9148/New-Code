<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart AI Planner</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e3a8a,#6366f1);
color:white;
transition:0.4s;
}

/* LIGHT MODE */

body.light{
background:white;
color:black;
}

/* LOGIN PAGE */

.login-page{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:rgba(255,255,255,0.1);
padding:40px;
border-radius:15px;
width:320px;
backdrop-filter:blur(12px);
text-align:center;
}

.login-box h2{
margin-bottom:20px;
}

.login-box input{
width:100%;
padding:12px;
margin-bottom:12px;
border:none;
border-radius:8px;
}

.login-box button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
cursor:pointer;
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
padding:20px 40px;
}

/* HERO */

.hero{
height:70vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:50px;
}

/* SEARCH PANEL */

.panel{
margin-top:20px;
background:rgba(255,255,255,0.1);
padding:25px;
border-radius:12px;
width:320px;
backdrop-filter:blur(12px);
}

input,select{
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:8px;
border:none;
}

/* MAP */

.map{
width:100%;
height:350px;
background:url("https://upload.wikimedia.org/wikipedia/commons/8/80/World_map_-_low_resolution.svg");
background-size:cover;
background-position:center;
margin-top:40px;
position:relative;
}

.route{
position:absolute;
width:200px;
height:3px;
background:red;
top:50%;
left:30%;
transform:rotate(20deg);
display:none;
animation:moveRoute 2s infinite linear;
}

@keyframes moveRoute{
0%{opacity:0}
50%{opacity:1}
100%{opacity:0}
}

/* RESULT */

.result{
text-align:center;
margin-top:20px;
font-size:18px;
}

/* DESTINATIONS */

.destinations{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
padding:40px;
}

.card{
background:rgba(255,255,255,0.1);
padding:20px;
border-radius:12px;
transition:0.4s;
}

.card:hover{
transform:translateY(-10px);
}

.card img{
width:100%;
border-radius:10px;
margin-bottom:10px;
}

/* AI PANEL */

.ai-panel{
margin:40px;
background:rgba(255,255,255,0.1);
padding:25px;
border-radius:12px;
}

</style>

</head>

<body>

<!-- LOGIN PAGE -->

<div class="login-page" id="loginPage">

<div class="login-box">

<h2>Login to Travel Planner</h2>

<input id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

</div>

<!-- MAIN APP -->

<div id="app" style="display:none">

<nav>

<h2>AI Travel Planner</h2>

<button onclick="toggleMode()">Dark / Light</button>

</nav>

<div class="hero">

<h1>Plan Your Journey</h1>

<p>Find the best travel routes with AI</p>

<div class="panel">

<input id="from" placeholder="From City">

<input id="to" placeholder="To City">

<select id="transport">

<option value="">Select Transport</option>
<option value="Flight">Flight</option>
<option value="Train">Train</option>
<option value="Bus">Bus</option>
<option value="Car">Car</option>

</select>

<button onclick="planTrip()">Find Route</button>

</div>

</div>

<div class="map">

<div class="route" id="routeLine"></div>

</div>

<div class="result" id="result"></div>

<div class="destinations">

<div class="card">

<img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470">

<h3>Goa</h3>

<p>Beautiful beaches and nightlife.</p>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1">

<h3>Bali</h3>

<p>Perfect island getaway.</p>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1469854523086-cc02fe5d8800">

<h3>Dubai</h3>

<p>Luxury city travel destination.</p>

</div>

</div>

<div class="ai-panel">

<h3>AI Travel Assistant</h3>

<input id="question" placeholder="Ask travel question">

<button onclick="askAI()">Ask</button>

<p id="answer"></p>

</div>

</div>

<script>

function login(){

let user=document.getElementById("username").value
let pass=document.getElementById("password").value

if(user && pass){

document.getElementById("loginPage").style.display="none"
document.getElementById("app").style.display="block"

}else{

alert("Enter username and password")

}

}

function toggleMode(){

document.body.classList.toggle("light")

}

function planTrip(){

let from=document.getElementById("from").value
let to=document.getElementById("to").value
let transport=document.getElementById("transport").value

if(!from || !to || !transport){

alert("Please fill all fields")

return

}

document.getElementById("routeLine").style.display="block"

document.getElementById("result").innerHTML=

"Route from <b>"+from+"</b> to <b>"+to+
"</b><br>Transport: <b>"+transport+"</b>"

}

function askAI(){

let q=document.getElementById("question").value

document.getElementById("answer").innerText=
"AI Suggestion: For '"+q+"' explore popular travel destinations."

}

</script>

</body>

</html>
